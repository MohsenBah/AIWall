<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AIWall{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
    <header class="topbar">
        <div class="brand">AIWall</div>
        <nav class="nav">
            <a href="/">Dashboard</a>
        </nav>
    </header>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        Self-hosted AI security gateway
    </footer>
</body>
</html>
