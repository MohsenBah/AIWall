# AIWall + optional Ollama (Phase 1.9b)
#
# Proxy + dashboard only:
#   docker compose -f deploy/docker-compose.yml up --build
#
# Include local Ollama:
#   docker compose -f deploy/docker-compose.yml --profile ollama up --build
#
# Customize config by editing deploy/examples/aiwall.docker.yaml or bind-mounting
# your own aiwall.yaml to /app/aiwall.yaml.

services:
  aiwall:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: aiwall
    restart: unless-stopped
    ports:
      - "${AIWALL_PORT:-8080}:${AIWALL_PORT:-8080}"
    environment:
      AIWALL_CONFIG: /app/aiwall.yaml
      AIWALL_PORT: ${AIWALL_PORT:-8080}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - aiwall_data:/app/data
      - ./examples/aiwall.docker.yaml:/app/aiwall.yaml:ro
      - ../prices.yaml.example:/app/prices.yaml:ro
    networks:
      - aiwall
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\"AIWALL_PORT\", \"8080\")}/healthz')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  ollama:
    profiles:
      - ollama
    image: ollama/ollama:latest
    container_name: aiwall-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aiwall

networks:
  aiwall:
    driver: bridge

volumes:
  aiwall_data:
  ollama_data:
